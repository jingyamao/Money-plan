name: money_plan
description: "Money Plan - 理财管理助手"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  provider: ^6.1.1

  # 路由管理
  go_router: ^14.6.2

  # 本地存储
  shared_preferences: ^2.3.3

  # Supabase
  supabase_flutter: ^2.3.4

  # HTTP 请求
  http: ^1.2.2

  # 图表
  fl_chart: ^0.70.2

  # 日期时间
  intl: ^0.19.0

  # UUID 生成
  uuid: ^4.5.1

  # 动画
  lottie: ^3.3.1

  # 滑动操作
  flutter_slidable: ^3.1.1

  # 日历
  table_calendar: ^3.1.2

  # 图标
  font_awesome_flutter: ^10.8.0

  # 本地通知
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
